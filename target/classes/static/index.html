<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Immobilienverwaltung</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Immobilienverwaltung</h1>

<h2>Neue Immobilie hinzufügen</h2>
<form id="addForm">
    <input type="text" id="newBezeichnung" placeholder="Bezeichnung">
    <input type="text" id="newStrasse" placeholder="Straße">
    <input type="text" id="newHausnummer" placeholder="Hausnummer">
    <input type="text" id="newPlz" placeholder="PLZ">
    <input type="text" id="newOrt" placeholder="Ort">
    <button onclick="addImmobilie()">Hinzufügen</button>
</form>

<h2>Alle Immobilien</h2>
<table id="immobilienTable">
    <thead>
    <tr>
        <th>ID</th>
        <th>Bezeichnung</th>
        <th>Straße</th>
        <th>Hausnummer</th>
        <th>PLZ</th>
        <th>Ort</th>
        <th>Aktionen</th>
    </tr>
    </thead>
    <tbody></tbody>

    <div id="editForm">
        <h3>Immobilie bearbeiten</h3>
        <input type="hidden" id="editId">

        <input type="text" id="editBezeichnung" placeholder="Bezeichnung">
        <input type="text" id="editStrasse" placeholder="Straße">
        <input type="text" id="editHausnummer" placeholder="Hausnummer">
        <input type="text" id="editPlz" placeholder="PLZ">
        <input type="text" id="editOrt" placeholder="Ort">

        <button onclick="submitEdit()">Speichern</button>
        <button onclick="hideEditForm()">Abbrechen</button>
    </div>
</table>

<script src="script.js"></script>
</body>
</html>
